<header class="navbar" [class.scrolled]="scrolled">
  <div class="container navbar-shell">
    <div class="navbar-inner">
      <a href="#hero" class="logo-wrap" (click)="setActive('hero')">
        <span class="logo-mark">FP</span>
        <div class="logo-text">
          <span class="logo-title">FP Motorsport</span>
          <span class="logo-subtitle">Driving Progress</span>
        </div>
      </a>

      <nav class="nav-links desktop-nav" aria-label="Hauptnavigation">
        @for (item of navItems; track item.id) {
          <a
            [href]="item.href"
            class="nav-link"
            [class.active]="activeSection === item.id"
            (click)="setActive(item.id)"
          >
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>

      <button
        class="menu-toggle"
        type="button"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen"
        aria-label="Menü öffnen"
      >
        <span [class.open]="menuOpen"></span>
        <span [class.open]="menuOpen"></span>
        <span [class.open]="menuOpen"></span>
      </button>
    </div>

    <div class="mobile-menu" [class.open]="menuOpen">
      @for (item of navItems; track item.id) {
        <a
          [href]="item.href"
          class="mobile-link"
          [class.active]="activeSection === item.id"
          (click)="setActive(item.id)"
        >
          {{ item.label }}
        </a>
      }
    </div>
  </div>
</header>
