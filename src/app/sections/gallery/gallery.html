<section id="gallery" class="gallery">
  <div class="container reveal-group" appRevealOnScroll>
    <p class="section-label">Galerie</p>
    <h2>Einblicke in Motorsport, SimRacing und Nordschleife</h2>

    <div class="gallery-grid">
      @for (card of cards; track card.key; let i = $index) {
        <div
          class="gallery-card reveal-item"
          [class.large]="card.large"
          [class.stagger-1]="i === 0"
          [class.stagger-2]="i === 1"
          [class.stagger-3]="i === 2"
          [class.stagger-4]="i === 3"
        >
          <img
            [ngSrc]="card.image"
            [alt]="card.alt"
            width="900"
            height="700"
            sizes="(max-width: 700px) 100vw, (max-width: 1000px) 50vw, 33vw"
            loading="lazy"
            decoding="async"
          />

          <div class="gallery-overlay">
            <h3>{{ card.title }}</h3>
            <p>{{ card.text }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
