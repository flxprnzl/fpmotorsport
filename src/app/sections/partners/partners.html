<section id="partners" class="partners">
  <div class="container" appRevealOnScroll>
    <p class="section-label">Partner</p>
    <h2>Partner und Unterstützer</h2>
  </div>

  <div class="marquee-wrapper">
    <div class="marquee-track">
      @for (partner of partners; track partner.name) {
        <a [href]="partner.url" target="_blank" rel="noopener" class="partner" [attr.aria-label]="partner.name">
          <img [src]="partner.image" [alt]="partner.alt" loading="eager" decoding="async" width="180" height="65" />
        </a>
      }
      @for (partner of partners; track partner.name + '_copy') {
        <a [href]="partner.url" target="_blank" rel="noopener" class="partner" aria-hidden="true" tabindex="-1">
          <img [src]="partner.image" [alt]="partner.alt" loading="eager" decoding="async" width="180" height="65" />
        </a>
      }
    </div>
  </div>
</section>
