<section id="partners" class="partners">
  <div class="container" appRevealOnScroll>
    <p class="section-label">Partner</p>
    <h2>Partner und Unterstützer</h2>
  </div>

  <div class="marquee-wrapper">
    <div class="marquee-track">
      <!-- Doppelt für nahtlosen Loop -->
      @for (partner of partners; track partner.name) {
        <a
          [href]="partner.url"
          target="_blank"
          rel="noopener"
          class="partner"
        >
          <img
            [ngSrc]="partner.image"
            [alt]="partner.alt"
            [width]="partner.width"
            [height]="partner.height"
            loading="lazy"
          />
        </a>
      }
      <!-- Kopie für nahtlosen Loop -->
      @for (partner of partners; track partner.name + '_copy') {
        <a
          [href]="partner.url"
          target="_blank"
          rel="noopener"
          class="partner"
        >
          <img
            [ngSrc]="partner.image"
            [alt]="partner.alt"
            [width]="partner.width"
            [height]="partner.height"
            loading="lazy"
          />
        </a>
      }
    </div>
  </div>
</section>
